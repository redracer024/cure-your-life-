<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Structural readability pass for generated symptom copy.
      // This does NOT split every couple sentences. That was lazy. This splits only at real section/step markers.
      (() => {
        const MIN_TEXT_LENGTH = 150;
        const BLOCK_TAGS = new Set(['P', 'DIV', 'SPAN', 'LI']);
        const SKIP_TAGS = new Set(['SCRIPT', 'STYLE', 'TEXTAREA', 'INPUT', 'BUTTON', 'SELECT', 'OPTION']);

        const normalize = (text) => text.replace(/\s+/g, ' ').trim();

        const hasStructuralMarkers = (text) => {
          const clean = normalize(text);
          return (
            /\b(BIOLOGICAL BREAKDOWN|PATHWAY|ANATOMICAL SYSTEM MECHANISM|STEP\s+\d+|CRITICAL CHECKPOINT|INTERVENTION CHECKLIST)\b/i.test(clean) ||
            /(?:^|\s)(?:Pathway\s*)?\d+\.\s+[A-Z][A-Za-z /-]{2,40}\s+[–—-]/.test(clean)
          );
        };

        const structuralParagraphs = (text) => {
          let clean = normalize(text);
          const paragraphs = [];

          const titleMatch = clean.match(/^(BIOLOGICAL BREAKDOWN(?:\s+PATHWAY)?|ANATOMICAL SYSTEM MECHANISM|INTERVENTION CHECKLIST)\b[:\s-]*/i);
          if (titleMatch) {
            paragraphs.push(titleMatch[1].toUpperCase());
            clean = clean.slice(titleMatch[0].length).trim();
          }

          // Turn numbered medical/mechanism stages into separate paragraphs.
          // Example: "Pathway 1. Trigger Recognition – ... 2. Immune Alarm – ..."
          clean = clean
            .replace(/\s+(Pathway\s+\d+\.\s+)/gi, '\n$1')
            .replace(/\s+(\d+\.\s+[A-Z][A-Za-z /-]{2,45}\s+[–—-]\s*)/g, '\n$1')
            .replace(/\s+(CRITICAL CHECKPOINT:\s*)/gi, '\n$1')
            .replace(/\s+(During mild|If symptoms|If breathing|If wheezing|If chest|Always keep|Seek immediate|Call emergency)\b/g, '\n$1');

          clean.split(/\n+/)
            .map(part => part.trim())
            .filter(Boolean)
            .forEach(part => paragraphs.push(part));

          // Only apply when we found actual structure. No random sentence chopping, because apparently we live and learn.
          return paragraphs.length > 1 ? paragraphs : [];
        };

        const isEligibleText = (text) => {
          const clean = normalize(text || '');
          return clean.length >= MIN_TEXT_LENGTH && hasStructuralMarkers(clean);
        };

        const formatNode = (node) => {
          const parent = node.parentElement;
          if (!parent || !BLOCK_TAGS.has(parent.tagName) || SKIP_TAGS.has(parent.tagName)) return;
          if (parent.dataset.cylParagraphized === 'true') return;

          const paragraphs = structuralParagraphs(node.nodeValue || '');
          if (paragraphs.length < 2) return;

          const wrapper = document.createElement('span');
          wrapper.dataset.cylParagraphized = 'true';
          wrapper.style.display = 'block';
          wrapper.style.whiteSpace = 'normal';
          wrapper.style.lineHeight = '1.75';

          paragraphs.forEach((paragraph, index) => {
            const p = document.createElement('span');
            p.textContent = paragraph;
            p.style.display = 'block';
            p.style.marginBottom = index === paragraphs.length - 1 ? '0' : '0.9rem';
            if (/^(BIOLOGICAL BREAKDOWN|ANATOMICAL SYSTEM MECHANISM|INTERVENTION CHECKLIST)$/i.test(paragraph)) {
              p.style.fontWeight = '800';
              p.style.letterSpacing = '0.06em';
              p.style.textTransform = 'uppercase';
            }
            wrapper.appendChild(p);
          });

          parent.replaceChild(wrapper, node);
          parent.dataset.cylParagraphized = 'true';
        };

        const run = () => {
          const root = document.getElementById('root');
          if (!root) return;

          const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
            acceptNode(node) {
              const parent = node.parentElement;
              if (!parent || SKIP_TAGS.has(parent.tagName)) return NodeFilter.FILTER_REJECT;
              if (parent.closest('[data-cyl-paragraphized="true"]')) return NodeFilter.FILTER_REJECT;
              return isEligibleText(node.nodeValue || '') ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_SKIP;
            }
          });

          const nodes = [];
          while (walker.nextNode()) nodes.push(walker.currentNode);
          nodes.forEach(formatNode);
        };

        const scheduleRun = () => window.requestAnimationFrame(run);
        window.addEventListener('load', scheduleRun);
        document.addEventListener('click', () => setTimeout(scheduleRun, 80), true);

        const observer = new MutationObserver(() => scheduleRun());
        observer.observe(document.documentElement, { childList: true, subtree: true });
      })();
    </script>
  </body>
</html>
